name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONIOENCODING: utf-8

jobs:
  validate:
    name: Python and workflow checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt PyYAML

      - name: Compile Python files
        run: python -m py_compile scripts/crawl_zol.py scripts/crawl_pconline.py scripts/merge_phones.py scripts/search_root_info.py scripts/proxy_manager.py scripts/generate_clash_config.py scripts/ai_verify_root_status.py

      - name: Validate syntax
        run: python scripts/validate_syntax.py

      - name: Validate workflow expectations
        run: python scripts/validate_workflow_expectations.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -p 'test_*.py'
