name: 中关村在线手机爬虫

on:
  workflow_dispatch:
    inputs:
      force_restart:
        description: '强制重新开始'
        required: false
        default: 'false'
      run_profile:
        description: '运行时长配置：auto/morning/afternoon'
        required: false
        default: 'auto'

env:
  RUN_TIME: 10800
  MORNING_RUN_TIME: 10800
  AFTERNOON_RUN_TIME: 21000
  MAX_WORKFLOW_SECONDS: 21600
  PROGRESS_COMMIT_BUFFER_SECONDS: 1800
  WINDOW_END_BUFFER_SECONDS: 900
  MAX_PAGES: 0
  MAX_PHONES: 0
  CRAWL_MIN_DELAY_SECONDS: 2
  CRAWL_MAX_DELAY_SECONDS: 3

concurrency:
  group: zol-phone-crawl-${{ github.ref }}-${{ github.event.inputs.run_profile || github.event_name }}
  cancel-in-progress: false

jobs:
  zol-crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 390
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare crawl period
        id: period
        run: |
          mkdir -p crawl_state
          echo "WORKFLOW_START_EPOCH=$(date +%s)" >> "$GITHUB_ENV"

          CN_DAY=$(TZ=Asia/Shanghai date +%d)
          CN_MONTH=$(TZ=Asia/Shanghai date +%Y%m)
          if [ $((10#$CN_DAY)) -le 15 ]; then
            CRAWL_PERIOD="${CN_MONTH}_H1"
          else
            CRAWL_PERIOD="${CN_MONTH}_H2"
          fi
          DONE_MARKER="crawl_state/zol_${CRAWL_PERIOD}.done"
          CURRENT_PERIOD_FILE="crawl_state/zol_current_period"
          echo "CRAWL_PERIOD=$CRAWL_PERIOD" >> "$GITHUB_ENV"
          echo "ZOL_DONE_MARKER=$DONE_MARKER" >> "$GITHUB_ENV"

          FORCE_RESTART="${{ github.event.inputs.force_restart }}"

          if [ "$FORCE_RESTART" = "true" ]; then
            rm -f "$DONE_MARKER"
            echo "INCREMENTAL_MODE=false" >> "$GITHUB_ENV"
            echo "强制重启，全量爬取模式"
          else
            echo "INCREMENTAL_MODE=true" >> "$GITHUB_ENV"
            echo "增量模式（只爬新增手机）"
          fi

          if [ "$FORCE_RESTART" = "true" ] || [ ! -f "$CURRENT_PERIOD_FILE" ] || [ "$(cat "$CURRENT_PERIOD_FILE")" != "$CRAWL_PERIOD" ]; then
            echo "进入新的半月周期 $CRAWL_PERIOD，重置进度"
            rm -f zol/progress.json
          fi
          echo "$CRAWL_PERIOD" > "$CURRENT_PERIOD_FILE"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Configure crawl window
        id: window
        if: steps.period.outputs.skip != 'true'
        env:
          PROFILE_INPUT: ${{ github.event.inputs.run_profile || 'auto' }}
        run: |
          python custom_scripts/crawl_budget.py configure
          echo "MAX_PAGES=0" >> "$GITHUB_ENV"
          echo "MAX_PHONES=0" >> "$GITHUB_ENV"

      - name: Set up Python
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true'
        uses: actions/setup-python@main
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true'
        run: pip install requests beautifulsoup4 lxml PyYAML

      - name: Setup environment
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true'
        run: |
          echo "MINIMAX_API_KEY=${{ secrets.MINIMAX_API_KEY }}" >> "$GITHUB_ENV"
          echo "ZEN_API_KEY=${{ secrets.ZEN_API_KEY }}" >> "$GITHUB_ENV"
          echo "XAI_API_KEY=${{ secrets.XAI_API_KEY }}" >> "$GITHUB_ENV"
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> "$GITHUB_ENV"

      - name: Setup proxy if configured
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true'
        env:
          PROXY_SUBSCRIPTIONS: ${{ secrets.PROXY_SUBSCRIPTIONS }}
        run: python custom_scripts/setup_proxy_runtime.py --github-env "$GITHUB_ENV"

      - name: Clamp step1 runtime to workflow budget
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true'
        run: python custom_scripts/crawl_budget.py clamp --step-label step1 --skip-env STEP1_SKIP

      - name: Run ZOL crawler
        id: step1
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true'
        run: |
          if [ "${STEP1_SKIP:-false}" = "true" ]; then
            echo "step1 已因剩余安全时间不足跳过"
            echo "complete=false" >> "$GITHUB_OUTPUT"
            echo "failed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          INCREMENTAL_FLAG=""
          if [ "$INCREMENTAL_MODE" = "true" ]; then
            INCREMENTAL_FLAG="--incremental"
          fi
          if [ "${PROXY_ENABLED:-false}" = "true" ]; then
            echo "使用代理模式运行 ZOL 爬虫"
          else
            echo "无代理，直接运行 ZOL 爬虫"
          fi

          set +e
          python crawl_zol.py --step 1 --time-limit "$RUN_TIME" --max-pages "$MAX_PAGES" --max-phones "$MAX_PHONES" --auto $INCREMENTAL_FLAG
          EXIT_CODE=$?
          set -e
          echo "ZOL step1 exit code: $EXIT_CODE"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ $EXIT_CODE -eq 10 ]; then
            echo "Step1 未完成，提交进度并正常结束本次运行"
            git add -A
            git diff --cached --quiet || git commit -m "chore: update ZOL crawl progress [skip ci]"
            bash custom_scripts/git_sync_progress.sh "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            echo "complete=false" >> "$GITHUB_OUTPUT"
            echo "failed=false" >> "$GITHUB_OUTPUT"
            exit 0
          elif [ $EXIT_CODE -ne 0 ]; then
            echo "Step1 失败"
            echo "complete=false" >> "$GITHUB_OUTPUT"
            echo "failed=true" >> "$GITHUB_OUTPUT"
            exit $EXIT_CODE
          fi

          echo "complete=true" >> "$GITHUB_OUTPUT"
          echo "failed=false" >> "$GITHUB_OUTPUT"

      - name: Parse and merge data
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && steps.step1.outputs.failed != 'true'
        run: python crawl_zol.py --step 2

      - name: Validate generated ZOL data
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && steps.step1.outputs.failed != 'true'
        id: validate_data
        run: |
          TODAY=$(date +%Y%m%d)
          DATA_FILE="zol_phones_${TODAY}.json"
          echo "zol_data_file=$DATA_FILE" >> "$GITHUB_OUTPUT"
          if [ ! -f "$DATA_FILE" ]; then
            echo "未找到中关村在线今日数据文件: $DATA_FILE"
            echo "zol_row_count=0" >> "$GITHUB_OUTPUT"
            echo "has_data=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ROW_COUNT=$(python3 -c "import json; print(len(json.load(open('$DATA_FILE', encoding='utf-8'))))" 2>/dev/null || echo "0")
          echo "zol_row_count=$ROW_COUNT" >> "$GITHUB_OUTPUT"
          if [ "$ROW_COUNT" -gt 0 ]; then
            echo "中关村在线今日数据有效: $DATA_FILE ($ROW_COUNT 行)"
            echo "has_data=true" >> "$GITHUB_OUTPUT"
          else
            echo "中关村在线今日数据文件为空，不上传空 artifact，不触发合并"
            rm -f "$DATA_FILE" "zol_phones_${TODAY}.csv"
            echo "has_data=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate summary
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && steps.step1.outputs.failed != 'true' && steps.validate_data.outputs.has_data == 'true'
        run: python crawl_zol.py --step 3

      - name: Mark crawl complete and commit
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && steps.step1.outputs.failed != 'true'
        run: |
          if [ "${{ steps.step1.outputs.complete }}" = "true" ] && [ "${{ steps.validate_data.outputs.has_data }}" = "true" ] && [ -f "zol_phones_$(date +%Y%m%d).json" ]; then
            touch "$ZOL_DONE_MARKER"
            echo "爬取完成，标记半月周期"
          else
            echo "本次爬取未完成或没有有效数据文件，仅同步进度"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: update ZOL crawl data [skip ci]"
          bash custom_scripts/git_sync_progress.sh "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

      - name: Upload crawl data
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && steps.step1.outputs.failed != 'true' && steps.validate_data.outputs.has_data == 'true'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: zol-phone-data-${{ github.run_id }}
          path: |
            zol_phones_*.json
            zol_phones_*.csv
          retention-days: 90

      - name: 检测新增数据并触发合并分析
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && steps.step1.outputs.failed != 'true'
        id: check_new_data
        run: |
          echo "zol_data_file=${{ steps.validate_data.outputs.zol_data_file }}" >> "$GITHUB_OUTPUT"
          echo "zol_row_count=${{ steps.validate_data.outputs.zol_row_count }}" >> "$GITHUB_OUTPUT"
          if [ "${{ steps.validate_data.outputs.has_data }}" = "true" ]; then
            echo "检测到中关村在线新增数据: ${{ steps.validate_data.outputs.zol_data_file }} (${{ steps.validate_data.outputs.zol_row_count }} 行)"
            echo "has_new_data=true" >> "$GITHUB_OUTPUT"
          else
            echo "中关村在线本次没有有效新增数据"
            echo "has_new_data=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 触发合并分析工作流
        if: steps.check_new_data.outputs.has_new_data == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "触发合并分析工作流..."
          gh api repos/${{ github.repository }}/actions/workflows/merge-and-deploy.yml/dispatches \
            --method POST \
            --field ref=main \
            --field inputs[force_merge]=false \
            --field inputs[trigger_source]=zol-crawl \
            --field inputs[trigger_date]=$(date +%Y%m%d)
          echo "合并分析工作流已触发"
