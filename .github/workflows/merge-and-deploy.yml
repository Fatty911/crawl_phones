name: 合并分析并发布
on:
  workflow_dispatch:
    inputs:
      force_merge:
        description: '强制重新合并'
        required: false
        default: 'false'
      trigger_source:
        description: '触发来源（pconline-crawl/zol-crawl/schedule/manual）'
        required: false
        default: 'manual'
      trigger_date:
        description: '触发日期（YYYYMMDD格式）'
        required: false
        default: ''
  push:
    paths:
      - 'data/zol_phones_*.json'
      - 'data/pconline_phones_*.json'
      - 'scripts/merge_phones.py'
      - 'scripts/ai_verify_root_status.py'
      - 'scripts/search_root_info.py'
      - 'scripts/git_sync_progress.sh'
      - 'docs/phones/**'
      - '!.done'
      - '!crawl_state/**'

permissions:
  contents: write
  actions: read

jobs:
  check-half-month-complete:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip merge]')
    outputs:
      is_complete: ${{ steps.check.outputs.is_complete }}
      crawl_period: ${{ steps.check.outputs.crawl_period }}
    steps:
      - name: 检出代码
        uses: actions/checkout@main

      - name: 检查半月周期是否完成
        id: check
        run: |
          CN_DAY=$(TZ=Asia/Shanghai date +%d)
          CN_MONTH=$(TZ=Asia/Shanghai date +%Y%m)
          if [ $((10#$CN_DAY)) -le 15 ]; then
            CRAWL_PERIOD="${CN_MONTH}_H1"
          else
            CRAWL_PERIOD="${CN_MONTH}_H2"
          fi
          echo "crawl_period=$CRAWL_PERIOD" >> $GITHUB_OUTPUT
          
          ZOL_DONE="crawl_state/zol_${CRAWL_PERIOD}.done"
          PCONLINE_DONE="crawl_state/pconline_${CRAWL_PERIOD}.done"
          
          if [ -f "$ZOL_DONE" ] && [ -f "$PCONLINE_DONE" ]; then
            echo "半月周期 $CRAWL_PERIOD 两个爬虫都已完成"
            echo "is_complete=true" >> $GITHUB_OUTPUT
          else
            echo "半月周期 $CRAWL_PERIOD 尚未完成全部爬取"
            echo "ZOL完成: $([ -f "$ZOL_DONE" ] && echo '是' || echo '否')"
            echo "PConline完成: $([ -f "$PCONLINE_DONE" ] && echo '是' || echo '否')"
            echo "is_complete=false" >> $GITHUB_OUTPUT
          fi

  merge-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [check-half-month-complete]
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip merge]')
    outputs:
      crawl_date: ${{ steps.date.outputs.date }}
      ready: ${{ steps.validate.outputs.ready }}
      is_half_month_complete: ${{ needs.check-half-month-complete.outputs.is_complete }}
      crawl_time: ${{ steps.date.outputs.time }}
    steps:
      - name: 检出代码
        uses: actions/checkout@main

      - name: 记录触发信息
        run: |
          echo "触发事件: ${{ github.event_name }}"
          echo "触发来源: ${{ github.event.inputs.trigger_source || 'push' }}"
          echo "触发日期: ${{ github.event.inputs.trigger_date || '未指定' }}"
          echo "当前日期: $(date +%Y%m%d)"
          echo "半月周期完成状态: ${{ needs.check-half-month-complete.outputs.is_complete }}"

      - name: 设置Python环境
        uses: actions/setup-python@main
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install requests beautifulsoup4 lxml

      - name: 强制重新合并
        if: github.event.inputs.force_merge == 'true'
        run: |
          echo "强制重新合并，清理旧数据文件..."
          rm -f data/zol_phones_*.json data/pconline_phones_*.json data/merged_phones_*.csv data/diff_phones_*.csv data/merged_phones_*.json

      - name: 下载所有增量爬虫数据
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "下载当前半月所有增量爬虫数据 artifact..."

          download_all_artifacts() {
            local workflow="$1"
            local pattern="$2"
            local label="$3"
            local json_glob="$4"
            local csv_glob="$5"
            local run_ids
            local total_downloaded=0

            run_ids=$(gh run list --repo "${{ github.repository }}" --workflow "$workflow" --status success --limit 50 --json databaseId --jq '.[].databaseId' 2>/dev/null || true)
            if [ -z "$run_ids" ]; then
              echo "未找到成功的 ${label} 爬虫运行"
              return 0
            fi

            while IFS= read -r run_id; do
              [ -n "$run_id" ] || continue
              echo "尝试下载 ${label} artifact，run=${run_id}"
              tmp_dir="$(mktemp -d)"
              if gh run download "$run_id" --repo "${{ github.repository }}" --pattern "$pattern" --dir "$tmp_dir" 2>/tmp/${workflow}_artifact_error.txt; then
                if TMP_DIR="$tmp_dir" JSON_GLOB="$json_glob" LABEL="$label" python3 - <<'PY'
          import glob
          import json
          import os
          import sys

          tmp_dir = os.environ["TMP_DIR"]
          json_glob = os.environ["JSON_GLOB"]
          label = os.environ["LABEL"]
          files = sorted(glob.glob(os.path.join(tmp_dir, "**", json_glob), recursive=True))
          if not files:
              print(f"{label} artifact 中没有 {json_glob}")
              sys.exit(1)
          for path in files:
              try:
                  with open(path, "r", encoding="utf-8") as f:
                      rows = json.load(f)
              except Exception as exc:
                  print(f"{label} artifact 文件 {path} 读取失败: {exc}")
                  continue
              count = len(rows) if isinstance(rows, list) else 0
              print(f"{label} artifact 文件 {os.path.basename(path)} 行数: {count}")
              if count >= 1:
                  sys.exit(0)
          sys.exit(1)
          PY
                then
                  # 不覆盖同名文件——给每个 artifact 加上 run_id 前缀以累积
                  find "$tmp_dir" -type f \( -name "$json_glob" -o -name "$csv_glob" \) -exec sh -c 'for f; do base="$(basename "$f")"; if [ -f "./data/$base" ]; then cp "$f" "./data/'${run_id}'_$base"; else cp "$f" ./data/; fi; done' _ {} \; 2>/dev/null || true
                  total_downloaded=$((total_downloaded + 1))
                  echo "已下载 ${label} artifact，run=${run_id}（累积 #${total_downloaded}）"
                else
                  echo "run=${run_id} 的 ${label} artifact 无有效数据，跳过"
                fi
                rm -rf "$tmp_dir"
              else
                rm -rf "$tmp_dir"
                echo "run=${run_id} 没有匹配 ${pattern} 的 artifact，跳过"
              fi
            done <<< "$run_ids"

            echo "${label} 共下载 ${total_downloaded} 个有效 artifact"
          }

          mkdir -p data
          download_all_artifacts "crawl-zol.yml" "zol-phone-data*" "中关村在线" "zol_phones_*.json" "zol_phones_*.csv"
          rm -rf zol-phone-data* 2>/dev/null || true

          download_all_artifacts "crawl-pconline.yml" "pconline-phone-data*" "太平洋电脑网" "pconline_phones_*.json" "pconline_phones_*.csv"
          rm -rf pconline-phone-data* 2>/dev/null || true

          echo "当前目录数据文件:"
          ls -la data/*.json 2>/dev/null || echo "没有找到数据文件"
          echo "=== 文件行数统计 ==="
          for f in data/zol_phones_*.json data/pconline_phones_*.json; do
            if [ -f "$f" ]; then
              ROWS=$(python3 -c "import json; print(len(json.load(open('$f'))))" 2>/dev/null || echo "0")
              echo "$f: $ROWS 行"
            fi
          done

      - name: 校验爬虫数据完整性
        id: validate
        env:
          EVENT_NAME: ${{ github.event_name }}
          FORCE_MERGE: ${{ github.event.inputs.force_merge }}
          TRIGGER_SOURCE: ${{ github.event.inputs.trigger_source || 'push' }}
          TRIGGER_DATE: ${{ github.event.inputs.trigger_date || '' }}
        run: |
          python - <<'PY'
          import glob
          import json
          import os
          import sys

          trigger_source = os.environ.get("TRIGGER_SOURCE", "push")
          trigger_date = os.environ.get("TRIGGER_DATE", "")
          event_name = os.environ.get("EVENT_NAME", "")
          force_merge = os.environ.get("FORCE_MERGE", "false")

          print(f"触发来源: {trigger_source}")
          print(f"触发日期: {trigger_date}")
          print(f"事件名称: {event_name}")

          checks = [
              ("中关村在线", "data/zol_phones_*.json"),
              ("太平洋电脑网", "data/pconline_phones_*.json"),
          ]
          valid_sources = 0
          for label, pattern in checks:
              files = sorted(glob.glob(pattern))
              if not files:
                  print(f"{label} 未找到 {pattern} 数据文件，跳过该来源")
                  continue
              path = files[-1]
              try:
                  with open(path, "r", encoding="utf-8") as f:
                      rows = json.load(f)
              except Exception as exc:
                  print(f"{label} 数据文件 {path} 读取失败: {exc}")
                  try:
                      os.remove(path)
                  except OSError:
                      pass
                  continue
              count = len(rows) if isinstance(rows, list) else 0
              print(f"{label} 数据文件: {path}, 行数: {count}")
              if count < 1:
                  print(f"{label} 数据文件为空，删除并跳过该来源")
                  try:
                      os.remove(path)
                  except OSError:
                      pass
              else:
                  valid_sources += 1
          ok = valid_sources > 0
          if trigger_source in ["pconline-crawl", "zol-crawl"] and not ok:
              print(f"被爬虫工作流 {trigger_source} 触发但未找到任何有效数据")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"ready={'true' if ok else 'false'}\n")
          if not ok:
              print("爬虫数据尚未完整，本次合并成功跳过，不发布不完整数据")
              if os.environ.get("EVENT_NAME") == "workflow_dispatch" and os.environ.get("FORCE_MERGE") == "true":
                  print("手动强制合并要求数据必须完整，按失败处理")
                  sys.exit(1)
              sys.exit(0)
          PY

      - name: 设置日期变量
        id: date
        if: steps.validate.outputs.ready == 'true'
        run: |
          CN_TIME=$(TZ=Asia/Shanghai date +%Y%m%d-%H%M)
          CN_DATE=$(echo $CN_TIME | cut -d- -f1)
          CN_HHMM=$(echo $CN_TIME | cut -d- -f2)
          echo "date=${CN_DATE}" >> $GITHUB_OUTPUT
          echo "time=${CN_HHMM}" >> $GITHUB_OUTPUT

      - name: 合并数据文件
        if: steps.validate.outputs.ready == 'true'
        env:
          MERGE_DATE: ${{ steps.date.outputs.date }}
        run: |
          if compgen -G "data/zol_phones_*.json" > /dev/null || compgen -G "data/pconline_phones_*.json" > /dev/null; then
            echo "找到数据文件，开始合并..."
            echo "合并数据..."
            cp data/*.json data/*.csv . 2>/dev/null || true
            python scripts/merge_phones.py
          else
            echo "没有找到数据文件，跳过合并"
            exit 0
          fi

      - name: AI root/越狱验证
        if: steps.validate.outputs.ready == 'true'
        continue-on-error: true
        env:
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MERGE_DATE: ${{ steps.date.outputs.date }}
        run: |
          MERGED="data/merged_phones_${MERGE_DATE}.json"
          if [ -s "$MERGED" ]; then
            echo "开始 AI root/越狱验证..."
            python scripts/ai_verify_root_status.py "$MERGED"
            echo "root/越狱验证完成"
          else
            echo "跳过 root/越狱验证（无合并文件）"
          fi

      - name: 检查合并结果
        if: steps.validate.outputs.ready == 'true'
        run: |
          if [ -s "data/merged_phones_${{ steps.date.outputs.date }}.json" ]; then
            echo "合并成功，生成文件:"
            ls -la data/merged_phones_* diff_phones_* 2>/dev/null || true
            ROWS=$(python -c 'import json; print(len(json.load(open("data/merged_phones_${{ steps.date.outputs.date }}.json", encoding="utf-8"))))')
            echo "合并数据行数: $ROWS"
            if [ "$ROWS" -lt 10 ]; then
              echo "合并数据少于 10 行，疑似爬虫数据不完整，拒绝发布"
              exit 1
            fi
          else
            echo "合并失败，未生成输出文件"
            exit 1
          fi

      - name: 提交合并产物到仓库
        if: steps.validate.outputs.ready == 'true'
        env:
          DATE: ${{ steps.date.outputs.date }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 如果有生成合并文件，提交到仓库（供 push 触发后续发布）
          if [ -f "data/merged_phones_${DATE}.json" ]; then
            mkdir -p docs/phones/data
            cp "data/merged_phones_${DATE}.json" docs/phones/data/latest.json
          fi
          git add -A
          if git diff --cached --quiet; then
            echo "没有变更，跳过提交"
          else
            git commit -m "chore: update merged phone data [skip merge] [skip ci]"
            echo "尝试推送到远程仓库..."
            if git push; then
              echo "✅ git push 成功"
            else
              echo "❌ git push 失败（可能是权限问题）"
              exit 1
            fi
          fi

      - name: 上传合并产物
        if: steps.validate.outputs.ready == 'true'
        uses: actions/upload-artifact@main
        with:
          name: phone-data-${{ steps.date.outputs.date }}-${{ steps.date.outputs.time }}
          path: |
            data/merged_phones_${{ steps.date.outputs.date }}.csv
            data/merged_phones_${{ steps.date.outputs.date }}.json
          retention-days: 90

  search-root-info:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [merge-data, check-half-month-complete]
    if: needs.merge-data.outputs.ready == 'true' && needs.check-half-month-complete.outputs.is_complete == 'true'
    steps:
      - name: 检出代码
        uses: actions/checkout@main

      - name: 设置Python环境
        uses: actions/setup-python@main
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install requests

      - name: 下载合并产物
        uses: actions/download-artifact@main
        with:
          name: phone-data-${{ needs.merge-data.outputs.crawl_date }}-${{ needs.merge-data.outputs.crawl_time }}
          path: .

      - name: AI搜索BL锁和Root信息
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: |
          INPUT_FILE="data/merged_phones_${{ needs.merge-data.outputs.crawl_date }}.json"
          if [ -f "$INPUT_FILE" ]; then
            echo "半月周期已完成，开始AI搜索BL锁和Root信息..."
            python scripts/search_root_info.py --input "$INPUT_FILE" --output "phones_with_root_info.json" --max-phones 500 --delay 2
          else
            echo "未找到合并数据文件，跳过AI搜索"
          fi

      - name: 上传搜索结果
        uses: actions/upload-artifact@main
        with:
          name: phone-root-info-${{ needs.merge-data.outputs.crawl_date }}
          path: phones_with_root_info.json
          retention-days: 90

  create-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [merge-data, search-root-info, check-half-month-complete]
    if: always() && needs.merge-data.outputs.ready == 'true'
    permissions:
      contents: write
      actions: read
    steps:
      - name: 检出代码
        uses: actions/checkout@main

      - name: 下载合并产物
        uses: actions/download-artifact@main
        with:
          name: phone-data-${{ needs.merge-data.outputs.crawl_date }}-${{ needs.merge-data.outputs.crawl_time }}
          path: release-files

      - name: 尝试下载搜索结果
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-files
          if gh run download "$GITHUB_RUN_ID" \
            --repo "${{ github.repository }}" \
            --name "phone-root-info-${{ needs.merge-data.outputs.crawl_date }}" \
            --dir release-files 2>/tmp/root_info_download.log; then
            echo "已下载 Root 信息搜索结果"
          else
            echo "未找到 Root 信息搜索结果，继续发布基础合并数据"
          fi

      - name: 创建发布
        uses: softprops/action-gh-release@master
        with:
          tag_name: v${{ needs.merge-data.outputs.crawl_date }}-${{ needs.merge-data.outputs.crawl_time }}
          name: 手机数据 ${{ needs.merge-data.outputs.crawl_date }}-${{ needs.merge-data.outputs.crawl_time }}
          files: |
            release-files/merged_phones_${{ needs.merge-data.outputs.crawl_date }}.csv
            release-files/merged_phones_${{ needs.merge-data.outputs.crawl_date }}.json
            release-files/phones_with_root_info.json
          fail_on_unmatched_files: false
          generate_release_notes: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-pages:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [merge-data, search-root-info, check-half-month-complete]
    if: always() && needs.merge-data.outputs.ready == 'true'
    permissions:
      contents: read
      actions: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 检出代码
        uses: actions/checkout@main

      - name: 下载合并产物
        uses: actions/download-artifact@main
        with:
          name: phone-data-${{ needs.merge-data.outputs.crawl_date }}-${{ needs.merge-data.outputs.crawl_time }}
          path: release-files

      - name: 尝试下载搜索结果
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-files
          if gh run download "$GITHUB_RUN_ID" \
            --repo "${{ github.repository }}" \
            --name "phone-root-info-${{ needs.merge-data.outputs.crawl_date }}" \
            --dir release-files 2>/tmp/root_info_download.log; then
            echo "已下载 Root 信息搜索结果"
          else
            echo "未找到 Root 信息搜索结果，继续部署基础合并数据"
          fi

      - name: 准备 Pages 静态站点
        run: |
          set -euo pipefail
          DATE="${{ needs.merge-data.outputs.crawl_date }}"
          rm -rf site
          mkdir -p site/data
          cp -R docs/phones/. site/

          if [ -f "release-files/phones_with_root_info.json" ]; then
            cp "release-files/phones_with_root_info.json" site/data/latest.json
          elif [ -f "release-files/merged_phones_${DATE}.json" ]; then
            cp "release-files/merged_phones_${DATE}.json" site/data/latest.json
          else
            echo "错误: 未找到合并数据文件"
            ls -la release-files/ 2>/dev/null || true
            exit 1
          fi

          if [ -f "release-files/merged_phones_${DATE}.csv" ]; then
            cp "release-files/merged_phones_${DATE}.csv" "site/data/merged_phones_${DATE}.csv"
          fi

          touch site/.nojekyll
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          date = os.environ["DATE"]
          with open("site/data/latest.json", "r", encoding="utf-8") as f:
              latest = json.load(f)

          manifest = {
              "date": date,
              "updatedAt": datetime.now(timezone.utc).isoformat(),
              "rowCount": len(latest),
              "files": {
                  "latestJson": "data/latest.json",
                  "latestCsv": f"data/merged_phones_{date}.csv",
              },
          }
          with open("site/data/manifest.json", "w", encoding="utf-8") as f:
              json.dump(manifest, f, ensure_ascii=False, indent=2)
          PY
        env:
          DATE: ${{ needs.merge-data.outputs.crawl_date }}

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v6

      - name: 上传 Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
