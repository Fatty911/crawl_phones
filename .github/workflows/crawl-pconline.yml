name: 太平洋电脑网手机爬虫

on:
  workflow_dispatch:
    inputs:
      force_restart:
        description: '强制重新开始'
        required: false
        default: 'false'
      run_profile:
        description: '运行时长配置：auto/morning/afternoon'
        required: false
        default: 'auto'
      max_phones:
        description: '最多爬取手机数（调试用，0=不限制）'
        required: false
        default: '0'
      debug_mode:
        description: '调试模式（忽略时间窗口，只爬 max_phones 条）'
        required: false
        default: 'false'

env:
  RUN_TIME: 10800
  MORNING_RUN_TIME: 10800
  AFTERNOON_RUN_TIME: 21600
  MAX_WORKFLOW_SECONDS: 21600
  PROGRESS_COMMIT_BUFFER_SECONDS: 1800
  WINDOW_END_BUFFER_SECONDS: 900
  CRAWL_MIN_DELAY_SECONDS: "8"
  CRAWL_MAX_DELAY_SECONDS: "20"
  MAX_PHONES: ${{ github.event.inputs.max_phones || '0' }}

concurrency:
  group: pconline-phone-crawl-${{ github.ref }}-${{ github.event.inputs.run_profile || github.event_name }}
  cancel-in-progress: false

jobs:
  pconline-crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 390
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare crawl period
        id: period
        run: |
          mkdir -p crawl_state
          echo "WORKFLOW_START_EPOCH=$(date +%s)" >> "$GITHUB_ENV"

          CN_DAY=$(TZ=Asia/Shanghai date +%d)
          CN_MONTH=$(TZ=Asia/Shanghai date +%Y%m)
          if [ $((10#$CN_DAY)) -le 15 ]; then
            CRAWL_PERIOD="${CN_MONTH}_H1"
          else
            CRAWL_PERIOD="${CN_MONTH}_H2"
          fi
          DONE_MARKER="crawl_state/pconline_${CRAWL_PERIOD}.done"
          CURRENT_PERIOD_FILE="crawl_state/pconline_current_period"
          echo "CRAWL_PERIOD=$CRAWL_PERIOD" >> "$GITHUB_ENV"
          echo "PCONLINE_DONE_MARKER=$DONE_MARKER" >> "$GITHUB_ENV"

          FORCE_RESTART="${{ github.event.inputs.force_restart }}"
          DEBUG_MODE="${{ github.event.inputs.debug_mode }}"

          if [ "$FORCE_RESTART" = "true" ]; then
            rm -f "$DONE_MARKER"
            echo "INCREMENTAL_MODE=false" >> "$GITHUB_ENV"
            echo "强制重启，全量爬取模式"
          elif [ "$DEBUG_MODE" = "true" ]; then
            echo "INCREMENTAL_MODE=true" >> "$GITHUB_ENV"
            echo "调试模式（不限时间窗口，限制爬取数量）"
          else
            echo "INCREMENTAL_MODE=true" >> "$GITHUB_ENV"
            echo "增量模式（只爬新增手机）"
          fi

          if [ "$FORCE_RESTART" = "true" ]; then
            echo "强制重启，重置进度"
            rm -f pconline/progress.json
          elif [ ! -f "$CURRENT_PERIOD_FILE" ] || [ "$(cat "$CURRENT_PERIOD_FILE")" != "$CRAWL_PERIOD" ]; then
            echo "进入新的半月周期 $CRAWL_PERIOD，保留已处理手机列表"
            if [ -f pconline/progress.json ]; then
              python3 -c "import json; p=json.load(open('pconline/progress.json')); p['current_brand_index']=0; p['current_page']=1; p['total_phones']=0; json.dump(p,open('pconline/progress.json','w'),indent=2); print('已重置品牌索引，保留已处理手机列表')"
            fi
          fi
          echo "$CRAWL_PERIOD" > "$CURRENT_PERIOD_FILE"

          if [ "$FORCE_RESTART" != "true" ] && [ "$DEBUG_MODE" != "true" ] && [ -f "$DONE_MARKER" ]; then
            echo "半月周期 $CRAWL_PERIOD 已完成，跳过所有爬取步骤"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure crawl window
        id: window
        if: steps.period.outputs.skip != 'true'
        env:
          PROFILE_INPUT: ${{ github.event.inputs.run_profile || 'auto' }}
        run: |
          if [ "$DEBUG_MODE" = "true" ]; then
            echo "调试模式：跳过时间窗口检查"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "MAX_PHONES=${{ github.event.inputs.max_phones || '30' }}" >> "$GITHUB_ENV"
            echo "DEBUG_LIMIT=${{ github.event.inputs.max_phones || '30' }}" >> "$GITHUB_ENV"
          else
            python custom_scripts/crawl_budget.py configure
            echo "MAX_PHONES=${{ github.event.inputs.max_phones || '0' }}" >> "$GITHUB_ENV"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true'
        uses: actions/setup-python@main
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true'
        run: pip install requests beautifulsoup4 lxml PyYAML

      - name: Setup environment
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true'
        run: |
          echo "MINIMAX_API_KEY=${{ secrets.MINIMAX_API_KEY }}" >> "$GITHUB_ENV"
          echo "ZEN_API_KEY=${{ secrets.ZEN_API_KEY }}" >> "$GITHUB_ENV"
          echo "XAI_API_KEY=${{ secrets.XAI_API_KEY }}" >> "$GITHUB_ENV"
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> "$GITHUB_ENV"

      - name: Setup proxy if configured
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true'
        env:
          PROXY_SUBSCRIPTIONS: ${{ secrets.PROXY_SUBSCRIPTIONS }}
        run: python custom_scripts/setup_proxy_runtime.py --github-env "$GITHUB_ENV"

      - name: Clamp step1 runtime to workflow budget
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true'
        run: python custom_scripts/crawl_budget.py clamp --step-label step1 --skip-env STEP1_SKIP

      - name: Run PConline crawler
        id: step1
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true'
        run: |
          if [ "${STEP1_SKIP:-false}" = "true" ]; then
            echo "step1 已因剩余安全时间不足跳过"
            echo "complete=false" >> "$GITHUB_OUTPUT"
            echo "failed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          INCREMENTAL_FLAG=""
          if [ "$INCREMENTAL_MODE" = "true" ]; then
            INCREMENTAL_FLAG="--incremental"
          fi
          DEBUG_LIMIT_FLAG=""
          if [ "${DEBUG_LIMIT:-0}" -gt 0 ]; then
            DEBUG_LIMIT_FLAG="--debug-limit $DEBUG_LIMIT"
          fi
          if [ "${PROXY_ENABLED:-false}" = "true" ]; then
            echo "使用代理模式运行 PConline 爬虫"
          else
            echo "无代理，直接运行 PConline 爬虫"
          fi

          set +e
          python crawl_pconline.py --step 1 --time-limit "$RUN_TIME" --max-phones "$MAX_PHONES" --auto $INCREMENTAL_FLAG $DEBUG_LIMIT_FLAG
          EXIT_CODE=$?
          set -e
          echo "PConline step1 exit code: $EXIT_CODE"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ $EXIT_CODE -eq 10 ]; then
            echo "Step1 未完成，提交进度并正常结束本次运行"
            git add -A
            git diff --cached --quiet || git commit -m "chore: update PConline crawl progress [skip ci]"
            bash custom_scripts/git_sync_progress.sh "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            echo "complete=false" >> "$GITHUB_OUTPUT"
            echo "failed=false" >> "$GITHUB_OUTPUT"
            exit 0
          elif [ $EXIT_CODE -ne 0 ]; then
            echo "Step1 失败"
            echo "complete=false" >> "$GITHUB_OUTPUT"
            echo "failed=true" >> "$GITHUB_OUTPUT"
            exit $EXIT_CODE
          fi

          echo "complete=true" >> "$GITHUB_OUTPUT"
          echo "failed=false" >> "$GITHUB_OUTPUT"

      - name: Upload crawl data (early, after step1)
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: pconline-phone-data-early-${{ github.run_id }}
          path: |
            pconline/json/
            pconline/progress.json
          retention-days: 90

      - name: Parse and merge data
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && steps.step1.outputs.failed != 'true'
        run: python crawl_pconline.py --step 2

      - name: Validate generated PConline data
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && steps.step1.outputs.failed != 'true'
        id: validate_data
        run: |
          TODAY=$(date +%Y%m%d)
          DATA_FILE="pconline_phones_${TODAY}.json"
          echo "pconline_data_file=$DATA_FILE" >> "$GITHUB_OUTPUT"
          if [ ! -f "$DATA_FILE" ]; then
            echo "未找到太平洋电脑网今日数据文件: $DATA_FILE"
            echo "pconline_row_count=0" >> "$GITHUB_OUTPUT"
            echo "has_data=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ROW_COUNT=$(python3 -c "import json; print(len(json.load(open('$DATA_FILE', encoding='utf-8'))))" 2>/dev/null || echo "0")
          echo "pconline_row_count=$ROW_COUNT" >> "$GITHUB_OUTPUT"
          if [ "$ROW_COUNT" -gt 0 ]; then
            VALID_RATE=$(python3 -c "import json; rows=json.load(open('$DATA_FILE')); total=len(rows); key_fields=['处理器','内存','存储','屏幕','电池','摄像头参数','上市时间']; bad={'','-','N/A','暂无','无','null','未知','/','--'}; results={f:sum(1 for r in rows if str(r.get(f,'')).strip() not in bad) for f in key_fields}; print(int(min(results.values())/total*100) if total>0 else 0)")
            if [ "$VALID_RATE" -ge 70 ]; then
              echo "太平洋电脑网今日数据有效: $DATA_FILE ($ROW_COUNT 行, 关键字段完整率 ${VALID_RATE}%)"
              echo "has_data=true" >> "$GITHUB_OUTPUT"
            else
              echo "太平洋电脑网关键字段不完整（${VALID_RATE}% < 70%），不上传"
              echo "has_data=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "太平洋电脑网今日数据文件为空，不上传空 artifact，不触发合并"
            rm -f "$DATA_FILE" "pconline_phones_${TODAY}.csv"
            echo "has_data=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate summary
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && steps.step1.outputs.failed != 'true'
        run: python crawl_pconline.py --step 3

      - name: Mark crawl complete and commit
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && steps.step1.outputs.failed != 'true'
        run: |
          if [ "${{ steps.step1.outputs.complete }}" = "true" ]; then
            touch "$PCONLINE_DONE_MARKER"
            echo "爬取完成（扫描所有品牌），标记半月周期"
          elif [ "${{ steps.validate_data.outputs.has_data }}" = "true" ] && [ -f "pconline_phones_$(date +%Y%m%d).json" ]; then
            touch "$PCONLINE_DONE_MARKER"
            echo "爬取完成（有有效数据），标记半月周期"
          else
            echo "本次爬取未完成，仅同步进度"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: update PConline crawl data [skip ci]"
          bash custom_scripts/git_sync_progress.sh "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

      - name: Upload crawl data
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && steps.step1.outputs.failed != 'true'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: pconline-phone-data-${{ github.run_id }}
          path: |
            pconline_phones_*.json
            pconline_phones_*.csv
          retention-days: 90

      - name: 检测新增数据并触发合并分析
        if: steps.period.outputs.skip != 'true' && steps.window.outputs.skip != 'true' && steps.step1.outputs.failed != 'true'
        id: check_new_data
        run: |
          echo "pconline_data_file=${{ steps.validate_data.outputs.pconline_data_file }}" >> "$GITHUB_OUTPUT"
          echo "pconline_row_count=${{ steps.validate_data.outputs.pconline_row_count }}" >> "$GITHUB_OUTPUT"
          if [ "${{ steps.validate_data.outputs.has_data }}" = "true" ]; then
            echo "检测到太平洋电脑网新增数据: ${{ steps.validate_data.outputs.pconline_data_file }} (${{ steps.validate_data.outputs.pconline_row_count }} 行)"
            echo "has_new_data=true" >> "$GITHUB_OUTPUT"
          else
            echo "太平洋电脑网本次没有有效新增数据"
            echo "has_new_data=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 触发合并分析工作流
        if: steps.check_new_data.outputs.has_new_data == 'true'
        env:
          GH_TOKEN: ${{ secrets.ACTION_PAT }}
        run: |
          echo "触发合并分析工作流..."
          gh api repos/${{ github.repository }}/actions/workflows/merge-and-deploy.yml/dispatches \
            --method POST \
            --input - <<EOF
          {
            "ref": "main",
            "inputs": {
              "force_merge": "false",
              "trigger_source": "pconline-crawl",
              "trigger_date": "$(date +%Y%m%d)"
            }
          }
          EOF
          echo "合并分析工作流已触发"
