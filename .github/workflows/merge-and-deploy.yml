name: 合并分析并发布
on:
  schedule:
    - cron: '30 12 * * *'
  workflow_dispatch:
    inputs:
      force_merge:
        description: '强制重新合并'
        required: false
        default: 'false'

jobs:
  merge-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      crawl_date: ${{ steps.date.outputs.date }}
      ready: ${{ steps.validate.outputs.ready }}
    steps:
      - name: 检出代码
        uses: actions/checkout@main

      - name: 设置Python环境
        uses: actions/setup-python@main
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install requests beautifulsoup4 lxml

      - name: 强制重新合并
        if: github.event.inputs.force_merge == 'true'
        run: |
          echo "强制重新合并，清理旧数据文件..."
          rm -f zol_phones_*.json pconline_phones_*.json merged_phones_*.csv diff_phones_*.csv merged_phones_*.json

      - name: 下载最新爬虫数据
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "尝试下载最新的爬虫数据 artifact..."

          ZOLRUN=$(gh run list --repo ${{ github.repository }} --workflow crawl-zol.yml --status success --limit 1 --json databaseId --jq '.[0].databaseId' 2>/dev/null || echo "")
          if [ -n "$ZOLRUN" ]; then
            echo "找到中关村在线成功运行: $ZOLRUN"
            gh run download "$ZOLRUN" --repo ${{ github.repository }} --pattern "zol-phone-data-*" --dir . 2>/dev/null || echo "下载中关村在线 artifact 失败"
            mv zol-phone-data-*/*.json . 2>/dev/null || true
            mv zol-phone-data-*/*.csv . 2>/dev/null || true
            rm -rf zol-phone-data-* 2>/dev/null || true
          else
            echo "未找到成功的中关村在线爬虫运行"
          fi

          PCONLINERUN=$(gh run list --repo ${{ github.repository }} --workflow crawl-pconline.yml --status success --limit 1 --json databaseId --jq '.[0].databaseId' 2>/dev/null || echo "")
          if [ -n "$PCONLINERUN" ]; then
            echo "找到太平洋电脑网成功运行: $PCONLINERUN"
            gh run download "$PCONLINERUN" --repo ${{ github.repository }} --pattern "pconline-phone-data-*" --dir . 2>/dev/null || echo "下载太平洋电脑网 artifact 失败"
            mv pconline-phone-data-*/*.json . 2>/dev/null || true
            mv pconline-phone-data-*/*.csv . 2>/dev/null || true
            rm -rf pconline-phone-data-* 2>/dev/null || true
          else
            echo "未找到成功的太平洋电脑网爬虫运行"
          fi

          echo "当前目录数据文件:"
          ls -la *.json 2>/dev/null || echo "没有找到数据文件"

      - name: 校验爬虫数据完整性
        id: validate
        env:
          EVENT_NAME: ${{ github.event_name }}
          FORCE_MERGE: ${{ github.event.inputs.force_merge }}
        run: |
          python - <<'PY'
          import glob
          import json
          import os
          import sys

          checks = [
              ("中关村在线", "zol_phones_*.json"),
              ("太平洋电脑网", "pconline_phones_*.json"),
          ]
          ok = True
          for label, pattern in checks:
              files = sorted(glob.glob(pattern))
              if not files:
                  print(f"{label} 未找到 {pattern} 数据文件")
                  ok = False
                  continue
              path = files[-1]
              try:
                  with open(path, "r", encoding="utf-8") as f:
                      rows = json.load(f)
              except Exception as exc:
                  print(f"{label} 数据文件 {path} 读取失败: {exc}")
                  ok = False
                  continue
              count = len(rows) if isinstance(rows, list) else 0
              print(f"{label} 数据文件: {path}, 行数: {count}")
              if count < 10:
                  print(f"{label} 数据少于 10 行，疑似爬虫数据不完整，拒绝合并")
                  ok = False
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"ready={'true' if ok else 'false'}\n")
          if not ok:
              print("爬虫数据尚未完整，本次合并成功跳过，不发布不完整数据")
              if os.environ.get("EVENT_NAME") == "workflow_dispatch" and os.environ.get("FORCE_MERGE") == "true":
                  print("手动强制合并要求数据必须完整，按失败处理")
                  sys.exit(1)
              sys.exit(0)
          PY

      - name: 合并数据文件
        if: steps.validate.outputs.ready == 'true'
        run: |
          if ls zol_phones_*.json pconline_phones_*.json 2>/dev/null; then
            echo "找到数据文件，开始合并..."
            python merge_phones.py
          else
            echo "没有找到数据文件，跳过合并"
            exit 0
          fi

      - name: 设置日期变量
        id: date
        if: steps.validate.outputs.ready == 'true'
        run: echo "date=$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: 检查合并结果
        if: steps.validate.outputs.ready == 'true'
        run: |
          if [ -s "merged_phones_${{ steps.date.outputs.date }}.json" ]; then
            echo "合并成功，生成文件:"
            ls -la merged_phones_* diff_phones_*
            ROWS=$(python -c 'import json; print(len(json.load(open("merged_phones_${{ steps.date.outputs.date }}.json", encoding="utf-8"))))')
            echo "合并数据行数: $ROWS"
            if [ "$ROWS" -lt 10 ]; then
              echo "合并数据少于 10 行，疑似爬虫数据不完整，拒绝发布"
              exit 1
            fi
          else
            echo "合并失败，未生成输出文件"
            exit 1
          fi

      - name: 上传合并产物
        if: steps.validate.outputs.ready == 'true'
        uses: actions/upload-artifact@main
        with:
          name: phone-data-${{ steps.date.outputs.date }}
          path: |
            merged_phones_${{ steps.date.outputs.date }}.csv
            merged_phones_${{ steps.date.outputs.date }}.json
          retention-days: 90

  search-root-info:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [merge-data]
    if: needs.merge-data.outputs.ready == 'true'
    steps:
      - name: 检出代码
        uses: actions/checkout@main

      - name: 设置Python环境
        uses: actions/setup-python@main
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install requests

      - name: 下载合并产物
        uses: actions/download-artifact@main
        with:
          name: phone-data-${{ needs.merge-data.outputs.crawl_date }}
          path: .

      - name: AI搜索BL锁和Root信息
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: |
          INPUT_FILE="merged_phones_${{ needs.merge-data.outputs.crawl_date }}.json"
          if [ -f "$INPUT_FILE" ]; then
            python search_root_info.py --input "$INPUT_FILE" --output "phones_with_root_info.json" --max-phones 100 --delay 2
          else
            echo "未找到合并数据文件，跳过AI搜索"
          fi

      - name: 上传搜索结果
        uses: actions/upload-artifact@main
        with:
          name: phone-root-info-${{ needs.merge-data.outputs.crawl_date }}
          path: phones_with_root_info.json
          retention-days: 90

  create-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [merge-data, search-root-info]
    if: needs.merge-data.outputs.ready == 'true'
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@main

      - name: 下载合并产物
        uses: actions/download-artifact@main
        with:
          name: phone-data-${{ needs.merge-data.outputs.crawl_date }}
          path: release-files

      - name: 下载搜索结果
        uses: actions/download-artifact@main
        with:
          name: phone-root-info-${{ needs.merge-data.outputs.crawl_date }}
          path: release-files
        continue-on-error: true

      - name: 创建发布
        uses: softprops/action-gh-release@master
        with:
          tag_name: v${{ needs.merge-data.outputs.crawl_date }}
          name: 手机数据 ${{ needs.merge-data.outputs.crawl_date }}
          files: |
            release-files/merged_phones_${{ needs.merge-data.outputs.crawl_date }}.csv
            release-files/merged_phones_${{ needs.merge-data.outputs.crawl_date }}.json
            release-files/phones_with_root_info.json
          fail_on_unmatched_files: false
          generate_release_notes: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-pages:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [merge-data, search-root-info]
    if: needs.merge-data.outputs.ready == 'true'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 检出代码
        uses: actions/checkout@main

      - name: 下载合并产物
        uses: actions/download-artifact@main
        with:
          name: phone-data-${{ needs.merge-data.outputs.crawl_date }}
          path: release-files

      - name: 下载搜索结果
        uses: actions/download-artifact@main
        with:
          name: phone-root-info-${{ needs.merge-data.outputs.crawl_date }}
          path: release-files
        continue-on-error: true

      - name: 准备 Pages 静态站点
        run: |
          set -euo pipefail
          DATE="${{ needs.merge-data.outputs.crawl_date }}"
          rm -rf site
          mkdir -p site/data
          cp -R docs/phones/. site/

          if [ -f "release-files/phones_with_root_info.json" ]; then
            cp "release-files/phones_with_root_info.json" site/data/latest.json
          else
            cp "release-files/merged_phones_${DATE}.json" site/data/latest.json
          fi

          cp "release-files/merged_phones_${DATE}.csv" "site/data/merged_phones_${DATE}.csv"

          touch site/.nojekyll
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          date = os.environ["DATE"]
          with open("site/data/latest.json", "r", encoding="utf-8") as f:
              latest = json.load(f)

          manifest = {
              "date": date,
              "updatedAt": datetime.now(timezone.utc).isoformat(),
              "rowCount": len(latest),
              "files": {
                  "latestJson": "data/latest.json",
                  "latestCsv": f"data/merged_phones_{date}.csv",
              },
          }
          with open("site/data/manifest.json", "w", encoding="utf-8") as f:
              json.dump(manifest, f, ensure_ascii=False, indent=2)
          PY
        env:
          DATE: ${{ needs.merge-data.outputs.crawl_date }}

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 上传 Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
